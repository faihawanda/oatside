<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oatside</title>
    <link rel="stylesheet" href="/src/output.css">
    <!-- Remixicon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">
</head>

<body class="m-0 p-0 overflow-x-hidden bg-[#5E99D6] font-[font-myscustom]">

    <!-- NAVBAR -->
    <header class="sticky top-0 z-50 bg-white border-b">

        <!-- Mobile Nav -->
        <div class="md:hidden">
            <nav class="grid grid-cols-3 items-center p-4">

                <!-- Left -->
                <div class="flex items-center gap-4">
                    <button id="menuBtn">
                        <i class="ri-menu-line text-2xl"></i>
                    </button>

                    <button>
                        <i class="ri-search-line text-2xl"></i>
                    </button>
                </div>

                <!-- Center -->
                <div class="flex justify-center">
                    <img src="/assets/logo-oatside.png" alt="Oatside" class="h-8 object-contain">
                </div>

                <!-- Right -->
                <div class="flex justify-end items-center gap-4">
                    <button>
                        <i class="ri-user-line text-2xl"></i>
                    </button>

                    <button>
                        <i class="ri-shopping-bag-line text-2xl"></i>
                    </button>
                </div>

            </nav>
        </div>

        <!-- Dekstop Nav -->
        <div class="hidden md:block">

            <!-- Top Row -->
            <nav class="grid grid-cols-3 items-center px-8 py-4">

                <!-- Search -->
                <div>
                    <div class="relative max-w-sm">
                        <input type="text" placeholder="Search our collection..."
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 pl-10 focus:outline-none focus:ring-2 focus:ring-black">

                        <i class="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>

                <!-- Logo -->
                <div class="flex justify-center">
                    <img src="/assets/logo-oatside.png" alt="Oatside" class="h-10 object-contain">
                </div>

                <!-- Icons -->
                <div class="flex justify-end items-center gap-6">
                    <button>
                        <i class="ri-star-line text-2xl"></i>
                    </button>

                    <button>
                        <i class="ri-user-line text-2xl"></i>
                    </button>

                    <button>
                        <i class="ri-heart-line text-2xl"></i>
                    </button>

                    <button>
                        <i class="ri-shopping-bag-line text-2xl"></i>
                    </button>
                </div>

            </nav>

            <!-- Bottom Menu -->
            <div class="border-t">
                <ul class="flex justify-center gap-10 py-4 text-sm tracking-wide font-medium">
                    <li><a href="#" class="hover:opacity-60">OATMILK</a></li>
                    <li><a href="#" class="hover:opacity-60">CEREAL BAR</a></li>
                    <li><a href="#" class="hover:opacity-60">NEW PRODUCTS</a></li>
                </ul>
            </div>

        </div>

    </header>

    <!-- Mobile Menu Drawer -->
    <div id="mobileMenu" class="fixed top-0 left-0 h-full w-[75%] bg-white shadow-lg 
       transform -translate-x-full transition duration-300 
       md:hidden z-40">

        <div class="p-6">
            <ul class="space-y-6 text-lg font-medium">
                <li><a href="#">OATMILK</a></li>
                <li><a href="#">CEREAL BAR</a></li>
                <li><a href="#">NEW PRODUCTS</a></li>
            </ul>
        </div>
    </div>

    <!-- Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black/40 hidden md:hidden z-30">
    </div>

    <!-- SKY HERO -->
    <section class="relative w-full">

        <img src="assets/sky-background.svg" class="w-full h-auto block" alt="Sky Background">

        <!-- Heading -->
        <div
            class="absolute inset-0 flex flex-col items-center justify-center text-white text-center px-4 pt-28 md:pt-36">

            <h1 class="text-3xl md:text-[70px] font-bold drop-shadow-lg animate-fadeUp pt-8
            md:pt-40">
                Your Oatside, Your Way
            </h1>

            <p class="mt-2 text- md:text-[30px] drop-shadow animate-fadeUp" style="animation-delay: 0.3s;">
                Smooth. Bold. Dairy-free.
            </p>

            <button class="mt-7 text-[13px]  border border-[#47464C] bg-[#F5E154] text-black 
                py-2 px-4 rounded-full font-semibold transition duration-300 ease-in-out
                hover:bg-[#47464C] hover:text-white hover:scale-105
                md:text-[20px] md:py-4 md:px-7 md:mt-20">
                Explore Now
            </button>

        </div>

    </section>

    <!-- BACKGROUND -->
    <section class="relative w-full">

        <img src="assets/background.svg" class="w-full h-auto block" alt="Landing Background">

        <!-- ABOUT SECTION -->
        <div class="absolute right-[5%] top-1/9 -translate-y-1/3 mt-4 z-10 flex flex-col items-center text-center">

            <h3 class="text-normal font-bold text-black leading-snug
            md:text-4xl">
                Made from oats.
                <span class="block">Made for better days.</span>
            </h3>

            <button class="mt-3 bg-[#F5E154] py-1 px-6 rounded-full text-[11px]
            border border-black transition duration-300 ease-in-out
            hover:bg-[#47464C] hover:text-white hover:scale-105 hover:border-[#47464C]
            md:text-2xl md:mt-5">
                See Film
            </button>

        </div>

        <div class="absolute right-[5%] top-1/5 -translate-y-1/3 z-10 pointer-events-none">
            <img src="assets/landing-1.gif" class="w-40 md:w-xl object-contain" />
        </div>

        <!-- CTA SECTION -->
        <div class="absolute left-[5%] top-1/2 -translate-y-1/3 mt-18 z-10 flex flex-col items-center text-center
        md:mt-78">

            <h3 class="text-normal font-bold text-black leading-snug
            md:text-4xl">
                No dairy.
                <span class="block">No drama.</span>
            </h3>

            <button class="mt-3 bg-[#F5E154] py-1 px-6 rounded-full text-[11px]
            border border-black transition duration-300 ease-in-out
            hover:bg-[#47464C] hover:text-white hover:scale-105 hover:border-[#47464C]
            md:text-2xl md:mt-5">
                Buy Now!
            </button>

        </div>

        <div class="absolute right-[5%] top-1/2 -translate-y-1/3 z-10 pointer-events-none pt-74">
            <img src="assets/landing-2.gif" class="w-40 object-contain
            md:pt-205 md:w-xl" />
        </div>

        <!-- NEW PRODUCTS SECTION -->
        <div class="absolute left-[5%] top-1/2 -translate-y-1/3 mt-152 z-10 flex flex-col items-center text-center
        md:mt-600">

            <h3 class="text-normal font-bold text-black leading-snug
            md:text-4xl">
                Stay in the loop.
                <span class="block">With us.</span>
            </h3>

            <button class="mt-3 bg-[#F5E154] py-1 px-6 rounded-full text-[11px]
            border border-black transition duration-300 ease-in-out
            hover:bg-[#47464C] hover:text-white hover:scale-105 hover:border-[#47464C]
            md:text-2xl md:mt-5">
                Discover What’s New
            </button>

        </div>

        <div class="absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/3 z-10 pointer-events-none pt-250">
            <img src="assets/landing-3.gif" class="w-70 object-contain
            md:pt-770 md:w-2xl" />
        </div>

    </section>

    <!-- FOOTER -->
    <footer class="px-6 py-10 bg-gray-100 text-center text-sm text-gray-600">

        <p class="font-bold mb-3">OATSIDE.</p>

        <div class="flex justify-center gap-6 mb-4">
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
            <a href="#">Contact</a>
        </div>

        <p>© 2026 OATSIDE. All Rights Reserved.</p>

    </footer>

    <!-- JS -->
    <script src="/js/main.js"></script>
</body>
